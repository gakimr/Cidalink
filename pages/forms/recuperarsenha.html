<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/accessibility.css">
    <link rel="stylesheet" href="../../css/styledark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>CidaLink - Recuperar a senha</title>

      <script async src="https://www.googletagmanager.com/gtag/js?id=G-71078FM2JV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-71078FM2JV');
</script>

</head>
<body>

      <header style="position: relative;">
        <div class="logocontainer">
        <a href="../../index.html" style="text-decoration: none; display: flex; align-items: center; color: inherit;">
        <img id="logo" src="../../img/Logo.svg" alt="CidaLink Logo">
        <p class="titulosite"><span class="tcida">Cida</span><span class="tlink">Link</span></p>
        </a>
        </div>
        

        <div class="language-selector" id="languageSelector">
            <button class="language-btn" aria-label="Selecionar idioma" data-translate="select_language">
                <i class="bi bi-translate"></i>
                <span>Português</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <div class="language-dropdown">
                <div class="language-option" data-lang="pt">
                    <i class="bi bi-check-lg"></i>
                    <span>Português</span>
                </div>
                <div class="language-option" data-lang="en">
                    <i class="bi bi-check-lg"></i>
                    <span>English</span>
                </div>
                <div class="language-option" data-lang="es">
                    <i class="bi bi-check-lg"></i>
                    <span>Español</span>
                </div>
                <div class="language-option" data-lang="fr">
                    <i class="bi bi-check-lg"></i>
                    <span>Français</span>
                </div>
            </div>
        </div>
        
        <!-- Acessibilidade: menu para simulação de daltonismo -->
       <div class="accessibility-menu">
    <button class="accessibility-btn" id="mainAccessibilityBtn">
    <i class="bi bi-universal-access"></i>
</button>

    <div class="accessibility-dropdown" id="mainAccessibilityDropdown">
        
        <div class="accessibility-header">
            <h3>Configurações</h3>
            <p>Ajustes de acessibilidade</p>
        </div>

        <div class="accessibility-options">

            <!-- MODO ESCURO -->
            <button class="accessibility-option" id="toggleDarkMode">
                🌙 Modo Escuro
            </button>

            <hr>

            <!-- DALTONISMO -->
            <button class="accessibility-option" data-filter="protanopia">Protanopia</button>
            <button class="accessibility-option" data-filter="deuteranopia">Deuteranopia</button>
            <button class="accessibility-option" data-filter="tritanopia">Tritanopia</button>

        </div>

        <div class="accessibility-footer">
            <button class="reset-btn" id="resetAccessibility">Resetar</button>
        </div>

    </div>
</div>
    </header>

    <main class="cardForm">
        <div class="cardlogin">
            <h2 data-translate="h2_recover_password">Recuperar Senha</h2>
            <h3 data-translate="h3_citizen">Cidadão</h3>
            <p style="margin-bottom: 2rem; color: #555;" data-translate="p_recover_instruction">Informe seu e-mail para receber um link de redefinição de senha.</p>
        <form action="#" method="post">
            <div class="inputgp">
                <label for="email" class="obrigatorio" data-translate="label_email">E-mail</label>

                <input type="email" id="email" name="email" required >
            </div>
        </form>
        <div class="ptlogin">
            <button class="btnEntrar" data-translate="btn_send_link">Enviar Link de Redefinição</button>
        </div>
            <a class="btnCd" href="logincid.html" data-translate="a_back_to_login">Voltar para o Login</a>
        </div>
    </main>
   
    <footer>
        <p data-translate="footer_text">&copy; 2025 Cidalink. Todos os direitos reservados.</p>
    </footer>

    <script src="../../script/script.js"></script>
    <script src="../../script/accessibility.js"></script>
    <script src="../../script/alternar-tema.js"></script>
    <script src="../../script/translate.js"></script>
    
        <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <!-- SVG Filters para simulação de daltonismo -->
    <svg class="svg-filters" xmlns="http://www.w3.org/2000/svg">
        <filter id="protanopia">
            <feColorMatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0" />
        </filter>
        <filter id="protanomalia">
            <feColorMatrix type="matrix" values="0.817 0.183 0 0 0  0.333 0.667 0 0 0  0 0.125 0.875 0 0  0 0 0 1 0" />
        </filter>
        <filter id="deuteranopia">
            <feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0" />
        </filter>
        <filter id="deuteranomalia">
            <feColorMatrix type="matrix" values="0.8 0.2 0 0 0  0.258 0.742 0 0 0  0 0.142 0.858 0 0  0 0 0 1 0" />
        </filter>
        <filter id="tritanopia">
            <feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0" />
        </filter>
        <filter id="tritanomalia">
            <feColorMatrix type="matrix" values="0.967 0.033 0 0 0  0 0.733 0.267 0 0  0 0.183 0.817 0 0  0 0 0 1 0" />
        </filter>
    </svg>
</body>
</html>
