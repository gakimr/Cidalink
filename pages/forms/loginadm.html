<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="utf-8"/>

<link href="../../css/style.css" rel="stylesheet"/>
<link href="../../css/accessibility.css" rel="stylesheet"/>
<link href="../../css/styledark.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<title>CidaLink - Login Administrador</title>
<script async="" src="https://www.googletagmanager.com/gtag/js?id=G-71078FM2JV"></script>
<script>

<body data-page="loginadm">
<header style="position: relative;">
<div class="logocontainer">
<img alt="CidaLink Logo" id="logo" src="../../img/Logo.svg"/>
<p class="titulosite"><span class="tcida">Cida</span><span class="tlink">Link</span></p>
</div>
<div class="language-selector" id="languageSelector">
<button aria-label="Selecionar idioma" class="language-btn" data-translate="select_language">
<i class="bi bi-translate"></i>
<span>Português</span>
<i class="bi bi-chevron-down"></i>
</button>
<div class="language-dropdown">
<div class="language-option" data-lang="pt">
<i class="bi bi-check-lg"></i>
<span>Português</span>
</div>
<div class="language-option" data-lang="en">
<i class="bi bi-check-lg"></i>
<span>English</span>
</div>
<div class="language-option" data-lang="es">
<i class="bi bi-check-lg"></i>
<span>Español</span>
</div>
<div class="language-option" data-lang="fr">
<i class="bi bi-check-lg"></i>
<span>Français</span>
</div>
</div>
</div>
<!-- Acessibilidade: menu para simulação de daltonismo -->
<div class="accessibility-menu">
<button aria-label="Configurações de acessibilidade" class="accessibility-btn" id="accessibilityBtn">
<i class="bi bi-eye-fill"></i>
</button>
<div class="accessibility-dropdown" id="accessibilityDropdown">
<div class="accessibility-header">
<h3 data-translate="accessibility_h3">Configurações de Visão</h3>
<p data-translate="accessibility_p">Ajuste as cores para diferentes tipos de daltonismo</p>
</div>
<div class="accessibility-options">
<button class="accessibility-option" data-filter="normal">
<span class="color-indicator normal"></span>
<span data-translate="option_normal">Visão Normal</span>
</button>
<button class="accessibility-option" data-filter="protanopia">
<span class="color-indicator protanopia"></span>
<span data-translate="option_protanopia">Protanopia</span>
</button>
<button class="accessibility-option" data-filter="protanomalia">
<span class="color-indicator protanomalia"></span>
<span data-translate="option_protanomalia">Protanomalia</span>
</button>
<button class="accessibility-option" data-filter="deuteranopia">
<span class="color-indicator deuteranopia"></span>
<span data-translate="option_deuteranopia">Deuteranopia</span>
</button>
<button class="accessibility-option" data-filter="deuteranomalia">
<span class="color-indicator deuteranomalia"></span>
<span data-translate="option_deuteranomalia">Deuteranomalia</span>
</button>
<button class="accessibility-option" data-filter="tritanopia">
<span class="color-indicator tritanopia"></span>
<span data-translate="option_tritanopia">Tritanopia</span>
</button>
<button class="accessibility-option" data-filter="tritanomalia">
<span class="color-indicator tritanomalia"></span>
<span data-translate="option_tritanomalia">Tritanomalia</span>
</button>
<button class="accessibility-option" data-filter="acromatopsia">
<span class="color-indicator acromatopsia"></span>
<span data-translate="option_acromatopsia">Acromatopsia</span>
</button>
<button class="accessibility-option" data-filter="acromatomalia">
<span class="color-indicator acromatomalia"></span>
<span data-translate="option_acromatomalia">Acromatomalia</span>
</button>
</div>
<div class="accessibility-footer">
<button class="reset-btn" id="resetAccessibility">
<i class="bi bi-arrow-clockwise"></i>
<span data-translate="reset_colors">Restaurar Cores Padrão</span>
</button>
</div>
</div>
</div>
</header>
<main class="cardForm">
<div class="cardlogin">
<h2 data-translate="h2_enter_cidalink">Entrar no CidaLink</h2>
<h3 data-translate="h3_admin">Administrador</h3>
<form action="#" method="post">
<div class="inputgp">
<label data-translate="label_cpf" for="cpf">CPF</label>
<input id="cpf" type="text"/>
</div>
<div class="inputgp">
<label data-translate="label_password" for="senha">Senha</label>
<input id="senha" type="password"/>
</div>
</form>
<div class="ptlogin">
<button class="btnEntrar" data-translate="btn_login_submit" id="btnEntrarAdmin">Entrar</button>
</div>
<div class="ptlogin">
<a class="rsenha" data-translate="a_forgot_password" href="recuperarsenha.html">Esqueceu a senha?</a>
</div>
<div class="ptlogin">
<p data-translate="p_no_account">Ainda não tem uma conta?</p>
<button class="btnCd" data-translate="btn_register_login" id="btnCadastrarAdministrador">Cadastre-se</button>
</div>
</div>
</main>
<button aria-label="Alternar modo escuro" id="botao-tema">🌙</button>
<footer>
<a class="fatec-fixed-banner" href="https://fatectq.cps.sp.gov.br/" target="_blank"><img alt="Fatec Taquaritinga" src="../../img/fatec.png"/></a>
<p data-translate="footer_text">© <span class="current-year"></span> Cidalink. Todos os direitos reservados.</p>
</footer>
<script src="../../script/script.js"></script>
<script src="../../script/accessibility.js"></script>
<script src="../../script/alternar-tema.js"></script>
<script src="../../script/translate.js"></script>
<div class="enabled" vw="">
<div class="active" vw-access-button=""></div>
<div vw-plugin-wrapper="">
<div class="vw-plugin-top-wrapper"></div>
</div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
<!-- SVG Filters para simulação de daltonismo -->
<svg class="svg-filters" xmlns="http://www.w3.org/2000/svg">
<filter id="protanopia">
<fecolormatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
<filter id="protanomalia">
<fecolormatrix type="matrix" values="0.817 0.183 0 0 0  0.333 0.667 0 0 0  0 0.125 0.875 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
<filter id="deuteranopia">
<fecolormatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
<filter id="deuteranomalia">
<fecolormatrix type="matrix" values="0.8 0.2 0 0 0  0.258 0.742 0 0 0  0 0.142 0.858 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
<filter id="tritanopia">
<fecolormatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
<filter id="tritanomalia">
<fecolormatrix type="matrix" values="0.967 0.033 0 0 0  0 0.733 0.267 0 0  0 0.183 0.817 0 0  0 0 0 1 0"></fecolormatrix>
</filter>
</svg>
</body>
</html>
