        <div class="logocontainer">
            <img id="logo" src="../../img/Logo.svg" alt="CidaLink Logo">

            <div class="line2"></div>

        <div class="language-selector" id="languageSelector">
            <button class="language-btn" aria-label="Selecionar idioma" data-translate="select_language">
                <i class="bi bi-translate"></i>
                <span>Português</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <div class="language-dropdown">
                <div class="language-option" data-lang="pt">
                    <i class="bi bi-check-lg"></i>
                    <span>Português</span>
                </div>
                <div class="language-option" data-lang="en">
                    <i class="bi bi-check-lg"></i>

                </div>
                <div class="language-option" data-lang="es">

                </div>
            </div>

 <div class="accessibility-menu">
    <button class="accessibility-btn" id="mainAccessibilityBtn">
    <i class="bi bi-universal-access"></i>
</button>

    <div class="accessibility-dropdown" id="mainAccessibilityDropdown">
        
        <div class="accessibility-header">
            <h3>Configurações</h3>
            <p>Ajustes de acessibilidade</p>
        </div>

        <div class="accessibility-options">

            <!-- MODO ESCURO -->
            <button class="accessibility-option" id="toggleDarkMode">
                🌙 Modo Escuro
            </button>

            <hr>

            <!-- DALTONISMO -->
            <button class="accessibility-option" data-filter="normal">Normal</button>
            <button class="accessibility-option" data-filter="protanopia">Protanopia</button>
            <button class="accessibility-option" data-filter="deuteranopia">Deuteranopia</button>
            <button class="accessibility-option" data-filter="tritanopia">Tritanopia</button>

        </div>

        <div class="accessibility-footer">
            <button class="reset-btn" id="resetAccessibility">Resetar</button>
        </div>

    </div>
</div>

     <div class="contentcontainer">
   
    <aside class="menu">
            <h2 class="menutitulo">Menu</h2>

        </nav>

        <div class="cardFormOc">
            <h2 data-translate="h2_create_occurrence">Criar Nova Ocorrência</h2>
            <form action="#" method="POST">
                <div class="inputgp">
                    <label for="tipoOcorrencia" data-translate="label_select_occurrence_type">Criar Ocorrência</label>
                <select id="tipoOcorrencia" name="tipoOcorrencia" required>
                    <option value="" data-translate="option_select_type">Selecione o tipo</option>
                    <option value="buraco" data-translate="option_pothole">Buraco na Rua</option>
                    <option value="iluminacao" data-translate="option_lighting">Iluminação Pública</option>
                    <option value="lixo" data-translate="option_trash" >Acúmulo de Lixo</option>
                    <option value="saneamento" data-translate="option_sanitation">Problemas de Saneamento</option>
                    <option value="outro" data-translate="option_other">Outro</option>
                </select>


                </div>
                <div class="inputgp">
                    <label for="descricao" data-translate="label_detailed_description">Descrição Detalhada</label>
                    <textarea id="descricao" name="descricao" rows="4" placeholder="" required></textarea>
                </div>
                <div class="inputgp">
                    <label for="localizacao" data-translate="label_location">Localização (Endereço ou Ponto de Referência)</label>
                    <input type="text" id="localizacao" name="localizacao" placeholder="" required>
                </div>
                <div class="inputgp">
                    <label for="anexo" data-translate="label_attach_photo">Anexar Foto</label>
                    <input type="file" id="anexo" name="anexo">
                </div>
                <button type="submit" class="btnoc" data-translate="btn_register_occurrence">Registrar Ocorrência</button>
            </form>
        </div>
    </div>
</main>
        
 </div>

 <a class="mensagenflut" href="chat.html" data-translate="float_button_messages">Mensagens<span class="notificacaop">2</span></a>
